<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #f9fafb;
            color: #111827;
            line-height: 1.47;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1rem;
        }

        .error-card {
            background: white;
            border-radius: 18px;
            padding: 3rem;
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: #ef4444;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        .message {
            font-size: 1.125rem;
            color: #111827;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #3b82f6;
            color: white;
            padding: 0.875rem 2rem;
            text-decoration: none;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <h1>Subscription Error</h1>
            <div class="message">{{ message }}</div>
            <a href="{{ url_for('subscribe_page') }}" class="back-link">← Try Again</a>
        </div>
    </div>

        {% include '_footer.html' %}
</body>
</html>
