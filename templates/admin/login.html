<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login — App Tracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #f3f4f6; display: flex; align-items: center; justify-content: center;
               min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
                padding: 2.5rem; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: .25rem; }
        .subtitle { color: #6b7280; font-size: .875rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
        input[type=text], input[type=password] {
            width: 100%; padding: .625rem .75rem; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: .95rem; margin-bottom: 1rem; transition: border-color .15s;
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        button { width: 100%; padding: .75rem; background: #2563eb; color: #fff; border: none;
                 border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
                 transition: background .15s; }
        button:hover { background: #1d4ed8; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
                 border-radius: 8px; padding: .75rem; margin-bottom: 1rem; font-size: .875rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Login</h1>
        <p class="subtitle">App Tracker Administration</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('admin.login_post') }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
