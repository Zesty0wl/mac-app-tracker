# Example nginx reverse-proxy config for App Tracker.
#
# Serves the tracker at https://<your-domain>/app-tracker/ and
# redirects the domain root to it. Replace the placeholders below.

server {
    listen 443 ssl;
    http2 on;
    server_name tracker.example.com;  # <-- change me

    # TLS certs - swap for your setup (Let's Encrypt, Cloudflare origin, etc.)
    ssl_certificate     /etc/ssl/certs/example.pem;
    ssl_certificate_key /etc/ssl/private/example.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect bare / to the app's prefix.
    location = / {
        return 302 /app-tracker/;
    }

    # App Tracker.
    # The container listens on 5000 internally; adjust if your
    # docker-compose.yml maps a different host port.
    location /app-tracker {
        rewrite ^/app-tracker/(.*) /$1 break;
        rewrite ^/app-tracker$ / break;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP -> HTTPS redirect.
server {
    listen 80;
    server_name tracker.example.com;  # <-- change me
    return 301 https://$host$request_uri;
}
